name: 🌩 ProxyIP-asn-filter

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    # 记得加上写入权限，否则 push 会报 403
    permissions:
      contents: write

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 执行筛选脚本
      run: python scripts/ProxyIP-asn-filter.py

    - name: 提交并推送生成的订阅文件
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 🟢 动态添加所有生成的 ProxyIP-*.txt 文件
        git add ProxyIP-*.txt
        
        # 检查暂存区是否有变化
        if git diff --staged --quiet; then
          echo "所有地区的 IP 列表均未发生变化，无需更新。"
        else
          git commit -m "自动更新各地区 ProxyIP 列表 (时间: $(date +'%Y-%m-%d %H:%M:%S'))"
          git push origin main
        fi
