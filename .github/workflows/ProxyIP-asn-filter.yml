name: 🌩 ProxyIP-asn-filter

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 🟢 已精简：直接运行脚本，不再注入任何 Secrets 变量
    - name: 执行筛选脚本
      run: python scripts/ProxyIP-asn-filter.py

    - name: 提交并推送生成的订阅文件
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        if [ -f ProxyIP-asn-ips.txt ]; then
          git add ProxyIP-asn-ips.txt
          if git diff --staged --quiet; then
            echo "IP 列表未发生变化，无需更新。"
          else
            git commit -m "自动更新 ProxyIP 列表 (时间: $(date +'%Y-%m-%d %H:%M:%S'))"
            git push origin main
          fi
        else
          echo "错误：未检测到生成的 ProxyIP-asn-ips.txt 文件！"
          exit 1
        fi
